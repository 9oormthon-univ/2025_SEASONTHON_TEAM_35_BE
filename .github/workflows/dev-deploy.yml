name: Growplan CI/CD

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      #------------------- CI --------------------

      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'


      - name: Grant execute permission for gradlew
        run: chmod +x ./server/gradlew

      # Gradle Caching
      - name: gradle caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # application.yml 파일 생성
      - name: make application.yml
        run: |
          mkdir -p ./server/src/main/resources
          cd ./server/src/main/resources
          touch ./application.yml
          echo "${{ secrets.APPLICATION_YML }}" > ./application.yml
        shell: bash

      # Spring Boot 어플리케이션 Build
      - name: Spring Boot Build
        run: |
          cd server
          ./gradlew clean build -x test

      # DockerHub Login
      - name: docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Docker 이미지 Build/Push
      - name: Build/Push Docker Image (Spring)
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE }}

      - name: Build/Push Docker Image (PyRec)
        run: |
          docker build -f pyrec/Dockerfile -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PYREC_IMAGE }} pyrec
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PYREC_IMAGE }}


      #------------------- CD --------------------

      # EC2 접속 후 서버 배포
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          key: ${{ secrets.EC2_SSH_KEY }}
          username: ${{ secrets.EC2_USERNAME }}
          port: ${{ secrets.EC2_SSH_PORT }}
          script: |
            # sudo docker stop ${{ secrets.DOCKER_IMAGE }}
            # sudo docker rm ${{ secrets.DOCKER_IMAGE }}
            # sudo docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE }}
            # sudo docker run -d -p 80:8080 --name ${{ secrets.DOCKER_IMAGE }} ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE }}
            # sudo docker image prune -f

            # 최신 이미지 풀
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE }}
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PYREC_IMAGE }}

            # 네트워크(없으면 생성)
            sudo docker network create growplan || true

            # 기존 컨테이너 정리
            sudo docker rm -f pyrec || true
            sudo docker rm -f ${{ secrets.DOCKER_IMAGE }} || true

            # FastAPI 컨테이너 (내부통신용: 포트 공개 불필요)
            sudo docker run -d --name pyrec \
              --network growplan \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PYREC_IMAGE }}

            # Spring 컨테이너 (외부 80 -> 내부 8080)
            sudo docker run -d --name ${{ secrets.DOCKER_IMAGE }} \
              --network growplan \
              -p 80:8080 \
              ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE }}

            # 찌꺼기 정리
            sudo docker image prune -f